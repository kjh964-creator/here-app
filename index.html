<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<title>HERE - 실시간 위치 공유</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',-apple-system,sans-serif;overflow:hidden;height:100vh;height:100dvh;background:#0a1628;}

  .page{height:100vh;height:100dvh;display:none;flex-direction:column;
    background:linear-gradient(145deg,#0a1628,#132744 50%,#1a3a5c);color:#fff;}
  .page.active{display:flex;}

  /* ===== 닉네임 ===== */
  #nickPage{align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto;}
  .globe{font-size:56px;margin-bottom:6px;animation:float 3s ease-in-out infinite;}
  #nickPage h1{font-size:30px;font-weight:800;margin:0 0 4px;
    background:linear-gradient(135deg,#4FC3F7,#81D4FA,#B3E5FC);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .sub{font-size:13px;color:#8EACC1;margin-bottom:24px;letter-spacing:2px;}
  .card{background:rgba(255,255,255,0.06);border-radius:18px;padding:22px;
    margin-bottom:18px;border:1px solid rgba(255,255,255,0.08);width:100%;max-width:320px;}
  .card-label{color:#8EACC1;font-size:12px;font-weight:600;margin-bottom:8px;text-align:left;padding-left:2px;}
  .inp{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
    border-radius:12px;padding:13px 16px;color:#fff;font-size:17px;text-align:center;
    outline:none;width:100%;font-family:inherit;transition:border 0.2s;}
  .inp::placeholder{color:#5a7a94;}
  .inp:focus{border-color:rgba(79,195,247,0.5);}
  .gender-row{display:flex;gap:10px;margin-top:4px;}
  .gender-btn{flex:1;padding:14px;border-radius:12px;border:2px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.03);color:#8EACC1;font-size:15px;font-weight:600;
    cursor:pointer;text-align:center;transition:all 0.2s;font-family:inherit;}
  .gender-btn.sel{border-color:#4FC3F7;background:rgba(79,195,247,0.1);color:#4FC3F7;}
  .gender-btn:active{transform:scale(0.97);}
  .big-btn{border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:700;
    cursor:pointer;transition:all 0.3s;font-family:inherit;width:100%;max-width:320px;}
  .big-btn.off{background:rgba(255,255,255,0.1);color:#5a7a94;cursor:not-allowed;}
  .big-btn.on{background:linear-gradient(135deg,#4FC3F7,#0288D1);color:#fff;box-shadow:0 4px 20px rgba(79,195,247,0.35);}
  .big-btn.on:active{transform:scale(0.96);}

  /* ===== 로비 ===== */
  #lobbyPage{padding:0;overflow-y:auto;}
  .lobby-top{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;background:linear-gradient(180deg,#0e1e30 80%,transparent);z-index:10;padding-top:24px;padding-bottom:12px;}
  .lobby-top h2{font-size:20px;font-weight:800;}
  .my-tag{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border-radius:30px;padding:5px 12px 5px 7px;}
  .my-tag .tnm{color:#B3E5FC;font-size:12px;font-weight:600;}
  .lobby-body{padding:0 20px 100px;}
  .create-btn{width:100%;padding:18px;border:2px dashed rgba(79,195,247,0.3);border-radius:16px;
    background:rgba(79,195,247,0.05);color:#4FC3F7;font-size:16px;font-weight:700;
    cursor:pointer;font-family:inherit;margin-bottom:20px;transition:all 0.2s;}
  .create-btn:active{background:rgba(79,195,247,0.15);transform:scale(0.98);}
  .sec-label{color:#5a7a94;font-size:12px;font-weight:600;margin-bottom:10px;letter-spacing:1px;}
  .rlist{display:flex;flex-direction:column;gap:10px;}
  .ritem{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;
    cursor:pointer;transition:all 0.2s;}
  .ritem:active{transform:scale(0.98);background:rgba(79,195,247,0.08);}
  .rleft{display:flex;align-items:center;gap:12px;}
  .ricon{font-size:26px;}
  .rname{color:#fff;font-size:15px;font-weight:700;}
  .rcnt{color:#8EACC1;font-size:12px;margin-top:2px;}
  .rjoin{background:linear-gradient(135deg,#4FC3F7,#0288D1);border:none;border-radius:10px;
    padding:8px 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .no-rooms{text-align:center;padding:40px 20px;color:#5a7a94;font-size:14px;line-height:1.6;}

  /* ===== 모달 ===== */
  .modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:3000;
    background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-bg.show{display:flex;}
  .modal{background:#1a2a3a;border-radius:20px;padding:26px;border:1px solid rgba(255,255,255,0.1);
    max-width:300px;width:100%;text-align:center;}
  .modal h3{color:#fff;font-size:17px;font-weight:700;margin-bottom:14px;}
  .modal .inp{margin-bottom:12px;font-size:16px;}
  .modal p.desc{color:#8EACC1;font-size:12px;margin-bottom:14px;line-height:1.5;}
  .modal-btns{display:flex;gap:10px;}
  .modal-btns button{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;border:none;}
  .mb-cancel{background:rgba(255,255,255,0.1);color:#8EACC1;}
  .mb-ok{background:linear-gradient(135deg,#4FC3F7,#0288D1);color:#fff;}
  .mb-red{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;}
  .modal .err{color:#ff6b6b;font-size:12px;margin-top:8px;display:none;}

  /* ===== 지도 ===== */
  #mapPage{position:relative;}
  #map{width:100%;height:100%;}
  .map-top{position:absolute;top:0;left:0;right:0;z-index:1000;
    background:linear-gradient(180deg,rgba(10,22,40,0.95) 60%,rgba(10,22,40,0));
    padding:12px 14px 24px;display:flex;align-items:center;justify-content:space-between;}
  .map-room{background:rgba(79,195,247,0.12);border:1px solid rgba(79,195,247,0.25);
    border-radius:12px;padding:8px 14px;color:#4FC3F7;font-size:14px;font-weight:700;
    display:flex;align-items:center;gap:6px;max-width:50%;overflow:hidden;}
  .map-btns{display:flex;gap:8px;}
  .mbtn{border-radius:12px;padding:8px 14px;font-size:13px;font-weight:600;
    cursor:pointer;font-family:inherit;border:none;display:flex;align-items:center;gap:4px;}
  .mbtn-hide{background:rgba(255,165,0,0.15);color:#FFA726;}
  .mbtn-hide.on{background:rgba(79,195,247,0.15);color:#4FC3F7;}
  .mbtn-exit{background:rgba(255,107,107,0.15);color:#ff6b6b;}

  .bottom-panel{position:absolute;bottom:0;left:0;right:0;z-index:1000;
    background:linear-gradient(0deg,rgba(10,22,40,0.95) 60%,rgba(10,22,40,0.8) 85%,transparent);
    padding:24px 10px 14px;display:none;}
  .ugrid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;}
  .uc{background:rgba(255,255,255,0.07);border-radius:14px;padding:10px 12px;
    border:1px solid rgba(255,255,255,0.08);text-align:center;cursor:pointer;
    transition:transform 0.15s;flex:1;min-width:70px;max-width:110px;}
  .uc:active{transform:scale(0.95);}
  .uc.me{border-color:rgba(79,195,247,0.3);background:rgba(79,195,247,0.08);}
  .uc.hid{opacity:0.5;}
  .uc .uia{font-size:26px;margin-bottom:2px;}
  .uc .uin{color:#fff;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .uc .uid{color:#4FC3F7;font-size:10px;margin-top:2px;}
  .uc .uih{color:#FFA726;font-size:9px;margin-top:2px;}
  .uc.sm{padding:8px;min-width:60px;}
  .uc.sm .uia{font-size:20px;}
  .uc.sm .uin{font-size:9px;}
  .uc.sm .uid{font-size:8px;}

  .gps-ov{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2000;
    background:rgba(10,22,40,0.95);border-radius:18px;padding:28px 36px;
    color:#fff;text-align:center;border:1px solid rgba(79,195,247,0.2);max-width:300px;}
  .retry{margin-top:16px;background:linear-gradient(135deg,#4FC3F7,#0288D1);
    border:none;border-radius:10px;padding:10px 28px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
  .recenter{position:absolute;right:12px;z-index:1000;
    background:rgba(10,22,40,0.9);border:1px solid rgba(79,195,247,0.3);
    border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;
    display:none;align-items:center;justify-content:center;color:#fff;}

  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- 1. 닉네임 -->
<div class="page active" id="nickPage">
  <div class="globe">🌍</div>
  <h1>HERE</h1>
  <p class="sub">실시간 위치 공유</p>
  <div class="card">
    <div class="card-label">닉네임</div>
    <input class="inp" id="nickInp" maxlength="12" placeholder="닉네임을 입력하세요" oninput="chkNick()">
    <div class="card-label" style="margin-top:14px">성별</div>
    <div class="gender-row">
      <div class="gender-btn" id="gMale" onclick="pickGender('m')">🙋‍♂️ 남자</div>
      <div class="gender-btn" id="gFemale" onclick="pickGender('f')">🙋‍♀️ 여자</div>
    </div>
  </div>
  <button class="big-btn off" id="goLobbyBtn" onclick="goLobby()">시작하기 🚀</button>
</div>

<!-- 2. 로비 -->
<div class="page" id="lobbyPage">
  <div class="lobby-top">
    <h2>🏠 로비</h2>
    <div class="my-tag"><span class="tnm" id="lobbyNick"></span></div>
  </div>
  <div class="lobby-body">
    <button class="create-btn" onclick="showCreate()">＋ 새 방 만들기</button>
    <div class="sec-label">현재 열린 방</div>
    <div class="rlist" id="roomList"><div class="no-rooms" id="noRooms">열린 방이 없습니다<br>새 방을 만들어보세요!</div></div>
  </div>
</div>

<!-- 방 만들기 모달 -->
<div class="modal-bg" id="createModal">
  <div class="modal">
    <h3>🏷️ 방 만들기</h3>
    <input class="inp" id="cRoomName" maxlength="20" placeholder="방 이름" onkeydown="if(event.key==='Enter')document.getElementById('cRoomPw').focus()">
    <input class="inp" id="cRoomPw" type="tel" maxlength="4" placeholder="비밀번호 (숫자 4자리)" pattern="[0-9]*" inputmode="numeric"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')" onkeydown="if(event.key==='Enter')doCreate()">
    <p class="desc">비밀번호를 아는 사람만 입장할 수 있어요</p>
    <div class="modal-btns">
      <button class="mb-cancel" onclick="hideCreate()">취소</button>
      <button class="mb-ok" onclick="doCreate()">만들기</button>
    </div>
    <div class="err" id="createErr"></div>
  </div>
</div>

<!-- 비번 입력 모달 -->
<div class="modal-bg" id="joinModal">
  <div class="modal">
    <h3>🔑 비밀번호 입력</h3>
    <div style="color:#8EACC1;font-size:13px;margin-bottom:12px" id="joinRoomLabel"></div>
    <input class="inp" id="joinPw" type="tel" maxlength="4" placeholder="숫자 4자리" pattern="[0-9]*" inputmode="numeric"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')" onkeydown="if(event.key==='Enter')doJoin()">
    <div class="modal-btns" style="margin-top:14px">
      <button class="mb-cancel" onclick="hideJoin()">취소</button>
      <button class="mb-ok" onclick="doJoin()">입장</button>
    </div>
    <div class="err" id="joinErr"></div>
  </div>
</div>

<!-- 나가기 모달 -->
<div class="modal-bg" id="exitModal">
  <div class="modal">
    <div style="font-size:40px;margin-bottom:12px">👋</div>
    <h3>방을 나갈까요?</h3>
    <p class="desc">내 위치가 사라지고 로비로 돌아갑니다</p>
    <div class="modal-btns">
      <button class="mb-cancel" onclick="hideExit()">취소</button>
      <button class="mb-red" onclick="leaveRoom()">나가기</button>
    </div>
  </div>
</div>

<!-- 3. 지도 -->
<div class="page" id="mapPage">
  <div id="map"></div>
  <div class="map-top">
    <div class="map-room" id="mapRoom">🏠</div>
    <div class="map-btns">
      <button class="mbtn mbtn-hide" id="hideBtn" onclick="toggleHide()">👁️ 숨기기</button>
      <button class="mbtn mbtn-exit" onclick="showExit()">🚪 나가기</button>
    </div>
  </div>
  <div class="gps-ov" id="gpsOv">
    <div style="font-size:36px;margin-bottom:12px;animation:spin 2s linear infinite">📡</div>
    <div style="font-size:15px;font-weight:600">GPS 연결 중...</div>
    <div style="font-size:12px;color:#5a7a94;margin-top:6px">잠시만 기다려주세요</div>
  </div>
  <div class="bottom-panel" id="btmPanel"><div class="ugrid" id="uGrid"></div></div>
  <button class="recenter" id="rcBtn" onclick="recenter()">🎯</button>
</div>

<script>
// ===== Firebase =====
firebase.initializeApp({
  apiKey:"AIzaSyDigW9GGdbEU7M1-YHHpvpdsmdQ--ywhUU",authDomain:"here-gps.firebaseapp.com",
  databaseURL:"https://here-gps-default-rtdb.firebaseio.com",projectId:"here-gps",
  storageBucket:"here-gps.firebasestorage.app",messagingSenderId:"375478624169",
  appId:"1:375478624169:web:9b9575483ee97de050eeb8"
});
const db=firebase.database();

// ===== Avatars =====
const MALE=["👨","🧔","👴","🤵","👨‍🦱","👨‍🦰","👨‍🦳","👨‍🦲"];
const FEMALE=["👩","👧","👵","👩‍🦱","👩‍🦰","👩‍🦳","👱‍♀️","🧕"];

// ===== State =====
const uid=Math.random().toString(36).slice(2,10);
let nick="",gender="",myAvatar="";
let curRoom="",curRoomId="";
let roomRef=null,roomListener=null,lobbyListener=null;
let myPos=null,hiding=false,users={};
let lmap=null,myMk=null,myCir=null,oMks={},watchId=null,updTimer=null;
let pendingJoinId="";

// ===== Pages =====
function showPage(id){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById(id).classList.add("active");}

// ===== 1. 닉네임 =====
function pickGender(g){
  gender=g;
  document.getElementById("gMale").className="gender-btn"+(g==="m"?" sel":"");
  document.getElementById("gFemale").className="gender-btn"+(g==="f"?" sel":"");
  chkNick();
}
function chkNick(){
  nick=document.getElementById("nickInp").value.trim();
  document.getElementById("goLobbyBtn").className=(nick&&gender)?"big-btn on":"big-btn off";
}
function goLobby(){
  if(!nick||!gender)return;
  document.getElementById("lobbyNick").textContent=nick;
  showPage("lobbyPage");
  startLobby();
}

// ===== 2. 로비 =====
function startLobby(){
  if(lobbyListener)db.ref("rooms").off("value",lobbyListener);
  lobbyListener=db.ref("rooms").on("value",snap=>{
    const data=snap.val()||{};
    const el=document.getElementById("roomList");
    const noEl=document.getElementById("noRooms");
    const rooms=[];
    Object.keys(data).forEach(k=>{
      const r=data[k];
      const cnt=r.users?Object.keys(r.users).length:0;
      if(cnt>0)rooms.push({id:k,name:r.info?r.info.name:k,count:cnt});
    });
    if(rooms.length===0){el.innerHTML="";el.appendChild(noEl);noEl.style.display="block";}
    else{
      noEl.style.display="none";
      el.innerHTML=rooms.map(r=>
        '<div class="ritem" onclick="askJoin(\''+r.id+'\',\''+r.name+'\')"><div class="rleft">'
        +'<div class="ricon">🏠</div><div><div class="rname">'+r.name+'</div>'
        +'<div class="rcnt">👥 '+r.count+'명</div></div></div>'
        +'<button class="rjoin" onclick="event.stopPropagation();askJoin(\''+r.id+'\',\''+r.name+'\')">입장</button></div>'
      ).join("");
    }
  });
}
function stopLobby(){if(lobbyListener){db.ref("rooms").off("value",lobbyListener);lobbyListener=null;}}

// 방 만들기
function showCreate(){document.getElementById("createModal").classList.add("show");
  document.getElementById("cRoomName").value="";document.getElementById("cRoomPw").value="";
  document.getElementById("createErr").style.display="none";document.getElementById("cRoomName").focus();}
function hideCreate(){document.getElementById("createModal").classList.remove("show");}
function doCreate(){
  const name=document.getElementById("cRoomName").value.trim();
  const pw=document.getElementById("cRoomPw").value.trim();
  const errEl=document.getElementById("createErr");
  if(!name){errEl.textContent="방 이름을 입력하세요";errEl.style.display="block";return;}
  if(pw.length!==4){errEl.textContent="비밀번호 4자리를 입력하세요";errEl.style.display="block";return;}
  hideCreate();
  const roomId=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  db.ref("rooms/"+roomId+"/info").set({name:name,pw:pw,created:Date.now()});
  enterRoom(roomId,name);
}

// 방 입장
function askJoin(roomId,roomName){
  pendingJoinId=roomId;
  document.getElementById("joinRoomLabel").textContent="방: "+roomName;
  document.getElementById("joinPw").value="";
  document.getElementById("joinErr").style.display="none";
  document.getElementById("joinModal").classList.add("show");
  document.getElementById("joinPw").focus();
}
function hideJoin(){document.getElementById("joinModal").classList.remove("show");}
function doJoin(){
  const pw=document.getElementById("joinPw").value.trim();
  const errEl=document.getElementById("joinErr");
  if(pw.length!==4){errEl.textContent="4자리 비밀번호를 입력하세요";errEl.style.display="block";return;}
  // 비번 확인
  db.ref("rooms/"+pendingJoinId+"/info").once("value",snap=>{
    const info=snap.val();
    if(!info){errEl.textContent="방이 존재하지 않습니다";errEl.style.display="block";return;}
    if(info.pw!==pw){errEl.textContent="비밀번호가 틀렸습니다";errEl.style.display="block";return;}
    hideJoin();
    enterRoom(pendingJoinId,info.name);
  });
}

function enterRoom(roomId,roomName){
  stopLobby();
  curRoomId=roomId;curRoom=roomName;
  roomRef=db.ref("rooms/"+roomId+"/users");

  // 겹치지 않는 아바타 배정
  roomRef.once("value",snap=>{
    const data=snap.val()||{};
    const taken=Object.values(data).map(u=>u.avatar);
    const pool=gender==="m"?MALE:FEMALE;
    const avail=pool.filter(a=>!taken.includes(a));
    myAvatar=avail.length>0?avail[Math.floor(Math.random()*avail.length)]:pool[Math.floor(Math.random()*pool.length)];

    document.getElementById("mapRoom").textContent="🏠 "+roomName;
    roomRef.child(uid).onDisconnect().remove();
    showPage("mapPage");
    hiding=false;updHideBtn();
    initMap();startGps();listenRoom();
    updTimer=setInterval(()=>{if(myPos)pubMe();},5000);
  });
}

// ===== 3. 지도 =====
function initMap(){
  if(lmap)lmap.remove();
  lmap=L.map("map",{zoomControl:false}).setView([37.15,127.08],16);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{
    attribution:"© OpenStreetMap, © CARTO"}).addTo(lmap);
  L.control.zoom({position:"bottomright"}).addTo(lmap);
  myMk=null;myCir=null;oMks={};
}

function startGps(){
  if(!navigator.geolocation){gpsErr("GPS를 지원하지 않는 기기입니다");return;}
  navigator.geolocation.getCurrentPosition(onGps,()=>{},{enableHighAccuracy:false,maximumAge:60000,timeout:8000});
  watchId=navigator.geolocation.watchPosition(onGps,
    e=>{if(myPos)return;
      if(e.code===1)gpsErr("위치 권한이 거부되었습니다\n\n브라우저 설정에서 위치를 허용해주세요");
      else if(e.code===2)gpsErr("GPS 신호를 찾을 수 없습니다");
      else gpsErr("위치 확인 시간 초과");},
    {enableHighAccuracy:true,maximumAge:5000,timeout:20000});
}
function onGps(p){
  myPos={lat:p.coords.latitude,lon:p.coords.longitude};
  document.getElementById("gpsOv").style.display="none";
  document.getElementById("rcBtn").style.display="flex";
  updMyMk();pubMe();
}
function gpsErr(msg){
  const el=document.getElementById("gpsOv");el.style.borderColor="rgba(255,107,107,0.3)";
  el.innerHTML='<div style="font-size:36px;margin-bottom:12px">⚠️</div>'
    +'<div style="font-size:14px;font-weight:600;white-space:pre-line;line-height:1.6">'+msg+'</div>'
    +'<button class="retry" onclick="retryGps()">다시 시도 🔄</button>';
}
function retryGps(){
  const el=document.getElementById("gpsOv");el.style.borderColor="rgba(79,195,247,0.2)";
  el.innerHTML='<div style="font-size:36px;margin-bottom:12px;animation:spin 2s linear infinite">📡</div><div style="font-size:15px;font-weight:600">GPS 재연결 중...</div>';
  if(watchId!==null)navigator.geolocation.clearWatch(watchId);myPos=null;startGps();
}
function updMyMk(){
  if(!lmap||!myPos||hiding)return;
  if(!myMk){
    const ic=L.divIcon({html:'<div style="font-size:28px;filter:drop-shadow(0 0 8px #4FC3F7);line-height:1">'+myAvatar+'</div>',className:"",iconSize:[34,34],iconAnchor:[17,17]});
    myMk=L.marker([myPos.lat,myPos.lon],{icon:ic,zIndexOffset:1000}).addTo(lmap);
    myCir=L.circle([myPos.lat,myPos.lon],{radius:30,color:"#4FC3F7",fillColor:"#4FC3F7",fillOpacity:0.1,weight:1}).addTo(lmap);
    lmap.setView([myPos.lat,myPos.lon],16);
  }else{myMk.setLatLng([myPos.lat,myPos.lon]);myCir.setLatLng([myPos.lat,myPos.lon]);}
}

function pubMe(){
  if(!roomRef||!myPos)return;
  roomRef.child(uid).set({id:uid,avatar:myAvatar,nickname:nick,gender:gender,
    lat:hiding?0:myPos.lat,lon:hiding?0:myPos.lon,hidden:hiding,ts:Date.now()});
}

function listenRoom(){
  if(roomListener&&roomRef)roomRef.off("value",roomListener);
  roomListener=roomRef.on("value",snap=>{
    const d=snap.val()||{};const now=Date.now();users={};
    Object.keys(d).forEach(k=>{if(now-d[k].ts<600000)users[k]=d[k];});
    renderBtm();renderMks();
  });
}

// Render
function hav(a,b,c,d){const R=6371000,r=x=>x*Math.PI/180,dLat=r(c-a),dLon=r(d-b),
  s=Math.sin(dLat/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));}
function fDist(m){return m<1000?Math.round(m)+"m":(m/1000).toFixed(1)+"km";}

function renderBtm(){
  const panel=document.getElementById("btmPanel"),grid=document.getElementById("uGrid");
  const arr=Object.values(users);
  if(arr.length===0){panel.style.display="none";return;}
  panel.style.display="block";
  const rc=document.getElementById("rcBtn");
  rc.style.bottom=arr.length<=4?"140px":"200px";
  const sm=arr.length>4;
  grid.innerHTML=arr.slice(0,8).map(u=>{
    const isMe=u.id===uid,isH=u.hidden;
    let dist="";
    if(!isMe&&!isH&&myPos&&u.lat!==0)dist=fDist(hav(myPos.lat,myPos.lon,u.lat,u.lon));
    const c="uc"+(sm?" sm":"")+(isMe?" me":"")+(isH?" hid":"");
    return '<div class="'+c+'" onclick="'+((!isMe&&!isH&&u.lat)?'lmap.setView(['+u.lat+','+u.lon+'],17)':'')+'">'+
      '<div class="uia">'+u.avatar+'</div><div class="uin">'+(isMe?"나":u.nickname)+'</div>'+
      (isH?'<div class="uih">숨김중</div>':dist?'<div class="uid">'+dist+'</div>':'')+'</div>';
  }).join("");
}

function renderMks(){
  if(!lmap)return;
  const arr=Object.values(users).filter(u=>u.id!==uid&&!u.hidden&&u.lat!==0);
  const ids=new Set(arr.map(u=>u.id));
  Object.keys(oMks).forEach(id=>{if(!ids.has(id)){lmap.removeLayer(oMks[id]);delete oMks[id];}});
  arr.forEach(u=>{
    const ic=L.divIcon({html:'<div style="font-size:22px;cursor:pointer;line-height:1">'+u.avatar+'</div>',className:"",iconSize:[28,28],iconAnchor:[14,14]});
    if(oMks[u.id]){oMks[u.id].setLatLng([u.lat,u.lon]);oMks[u.id].setIcon(ic);}
    else{const m=L.marker([u.lat,u.lon],{icon:ic}).addTo(lmap);
      m.bindPopup('<div style="text-align:center;font-family:sans-serif"><div style="font-size:22px">'+u.avatar+'</div><b>'+u.nickname+'</b></div>');
      m.on("click",()=>lmap.setView([u.lat,u.lon],17));oMks[u.id]=m;}
  });
}

// 숨기기
function toggleHide(){
  hiding=!hiding;updHideBtn();
  if(hiding){if(myMk){lmap.removeLayer(myMk);myMk=null;}if(myCir){lmap.removeLayer(myCir);myCir=null;}}
  else updMyMk();
  pubMe();
}
function updHideBtn(){
  const b=document.getElementById("hideBtn");
  b.className=hiding?"mbtn mbtn-hide on":"mbtn mbtn-hide";
  b.innerHTML=hiding?"👁️ 보이기":"👁️ 숨기기";
}

// 나가기
function showExit(){document.getElementById("exitModal").classList.add("show");}
function hideExit(){document.getElementById("exitModal").classList.remove("show");}
function leaveRoom(){
  hideExit();
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  if(updTimer){clearInterval(updTimer);updTimer=null;}
  if(roomRef){roomRef.child(uid).remove();if(roomListener)roomRef.off("value",roomListener);roomListener=null;}
  if(lmap){lmap.remove();lmap=null;}
  myMk=null;myCir=null;oMks={};myPos=null;users={};hiding=false;roomRef=null;
  // 리셋
  const ov=document.getElementById("gpsOv");ov.style.display="block";ov.style.borderColor="rgba(79,195,247,0.2)";
  ov.innerHTML='<div style="font-size:36px;margin-bottom:12px;animation:spin 2s linear infinite">📡</div><div style="font-size:15px;font-weight:600">GPS 연결 중...</div><div style="font-size:12px;color:#5a7a94;margin-top:6px">잠시만 기다려주세요</div>';
  document.getElementById("btmPanel").style.display="none";
  document.getElementById("rcBtn").style.display="none";
  showPage("lobbyPage");startLobby();
}

function recenter(){if(lmap&&myPos)lmap.setView([myPos.lat,myPos.lon],16);}

window.addEventListener("beforeunload",()=>{if(roomRef)roomRef.child(uid).remove();});
window.addEventListener("pagehide",()=>{if(roomRef)roomRef.child(uid).remove();});
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
