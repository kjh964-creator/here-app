<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<title>HERE - 실시간 위치 공유</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',-apple-system,sans-serif;overflow:hidden;height:100vh;height:100dvh;background:#0a1628;}

  .page{height:100vh;height:100dvh;display:none;flex-direction:column;
    background:linear-gradient(145deg,#0a1628,#132744 50%,#1a3a5c);color:#fff;}
  .page.active{display:flex;}

  /* ===== 닉네임 페이지 ===== */
  #nickPage{align-items:center;justify-content:center;padding:24px;text-align:center;}
  .globe{font-size:72px;margin-bottom:12px;animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  #nickPage h1{
    font-size:28px;font-weight:800;margin:0 0 6px;
    background:linear-gradient(135deg,#4FC3F7,#81D4FA,#B3E5FC);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .sub{font-size:13px;color:#8EACC1;margin-bottom:32px;letter-spacing:2px;}
  .card{
    background:rgba(255,255,255,0.06);border-radius:16px;padding:20px 24px;
    margin-bottom:24px;border:1px solid rgba(255,255,255,0.08);width:100%;max-width:300px;
  }
  .avatar-big{font-size:48px;margin-bottom:12px;}
  .gender-row{display:flex;gap:12px;justify-content:center;margin-bottom:16px;}
  .gender-btn{
    padding:8px 24px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.05);color:#8EACC1;font-size:14px;cursor:pointer;
    transition:all 0.3s;font-family:inherit;
  }
  .gender-btn.sel{background:rgba(79,195,247,0.2);border-color:rgba(79,195,247,0.5);color:#4FC3F7;}
  .nick-input{
    background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
    border-radius:10px;padding:12px 14px;color:#fff;font-size:16px;text-align:center;
    outline:none;width:85%;font-family:inherit;
  }
  .nick-input::placeholder{color:#5a7a94;}
  .connect-btn{
    background:rgba(255,255,255,0.1);border:none;border-radius:14px;
    padding:14px 48px;color:#5a7a94;font-size:17px;font-weight:700;
    cursor:not-allowed;transition:all 0.3s;font-family:inherit;
  }
  .connect-btn.active{
    background:linear-gradient(135deg,#4FC3F7,#0288D1);color:#fff;cursor:pointer;
    box-shadow:0 4px 20px rgba(79,195,247,0.3);
  }

  /* ===== 로비 페이지 ===== */
  #lobbyPage{padding:0;}
  .lobby-top{padding:20px 20px 12px;text-align:center;flex-shrink:0;}
  .lobby-top h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px;}
  .lobby-top .nick-info{font-size:13px;color:#8EACC1;}
  .lobby-actions{display:flex;gap:10px;padding:0 20px 12px;flex-shrink:0;}
  .lobby-btn{
    flex:1;padding:12px;border-radius:12px;border:none;font-size:14px;
    font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.3s;
  }
  .lobby-btn.create{background:linear-gradient(135deg,#4FC3F7,#0288D1);color:#fff;}
  .lobby-btn.refresh{background:rgba(255,255,255,0.08);color:#8EACC1;border:1px solid rgba(255,255,255,0.1);}
  .room-list{flex:1;overflow-y:auto;padding:0 20px 20px;}
  .room-item{
    background:rgba(255,255,255,0.06);border-radius:14px;padding:16px;
    margin-bottom:10px;border:1px solid rgba(255,255,255,0.08);cursor:pointer;
    transition:all 0.2s;display:flex;justify-content:space-between;align-items:center;
  }
  .room-item:active{background:rgba(79,195,247,0.1);border-color:rgba(79,195,247,0.3);}
  .room-name{font-size:15px;font-weight:600;color:#fff;}
  .room-count{font-size:12px;color:#4FC3F7;margin-top:2px;}
  .room-arrow{color:#5a7a94;font-size:18px;}
  .empty-lobby{text-align:center;padding:60px 20px;color:#5a7a94;font-size:14px;}

  /* ===== 모달 ===== */
  .modal-bg{
    position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);
    display:none;align-items:center;justify-content:center;z-index:9999;padding:20px;
  }
  .modal-bg.show{display:flex;}
  .modal-box{
    background:linear-gradient(145deg,#132744,#1a3a5c);border-radius:20px;
    padding:28px 24px;width:100%;max-width:320px;border:1px solid rgba(79,195,247,0.15);
  }
  .modal-box h3{font-size:18px;font-weight:700;color:#fff;margin-bottom:16px;text-align:center;}
  .modal-input{
    width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
    border-radius:10px;padding:12px 14px;color:#fff;font-size:15px;outline:none;
    font-family:inherit;margin-bottom:10px;
  }
  .modal-input::placeholder{color:#5a7a94;}
  .modal-err{color:#ff7043;font-size:12px;text-align:center;display:none;margin-bottom:8px;}
  .modal-btns{display:flex;gap:10px;margin-top:8px;}
  .modal-btns button{
    flex:1;padding:12px;border-radius:12px;border:none;font-size:14px;
    font-weight:600;cursor:pointer;font-family:inherit;
  }
  .modal-cancel{background:rgba(255,255,255,0.08);color:#8EACC1;}
  .modal-ok{background:linear-gradient(135deg,#4FC3F7,#0288D1);color:#fff;}

  /* ===== 지도 페이지 ===== */
  #mapPage{position:relative;}
  #map{flex:1;z-index:1;}
  .top-bar{
    position:absolute;top:0;left:0;right:0;z-index:1000;
    background:linear-gradient(180deg,rgba(10,22,40,0.95),rgba(10,22,40,0.7) 80%,transparent);
    padding:12px 16px 24px;display:flex;justify-content:space-between;align-items:center;
  }
  .top-left{display:flex;align-items:center;gap:8px;}
  .top-room{font-size:15px;font-weight:700;color:#fff;}
  .top-status{font-size:11px;color:#4FC3F7;}
  .top-right{display:flex;gap:8px;}
  .top-btn{
    padding:6px 14px;border-radius:20px;border:none;font-size:12px;
    font-weight:600;cursor:pointer;font-family:inherit;
  }
  .btn-hide{background:rgba(255,107,107,0.15);color:#ff6b6b;border:1px solid rgba(255,107,107,0.3);}
  .btn-share{background:rgba(79,195,247,0.15);color:#4FC3F7;border:1px solid rgba(79,195,247,0.3);}
  .btn-exit{background:rgba(255,255,255,0.08);color:#8EACC1;border:1px solid rgba(255,255,255,0.1);}

  /* GPS 로딩 */
  #gpsLoading{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1000;
    text-align:center;color:#fff;
  }
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .spin{animation:spin 2s linear infinite;display:inline-block;}

  /* 하단 유저 카드 */
  .user-cards{
    position:absolute;bottom:0;left:0;right:0;z-index:1000;
    background:linear-gradient(0deg,rgba(10,22,40,0.95),rgba(10,22,40,0.7) 80%,transparent);
    padding:20px 12px 16px;
  }
  .cards-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
  .u-card{
    background:rgba(255,255,255,0.06);border-radius:12px;padding:8px 6px;
    border:1px solid rgba(255,255,255,0.08);text-align:center;cursor:pointer;
    transition:all 0.2s;min-width:70px;
  }
  .u-card:active{border-color:rgba(79,195,247,0.4);}
  .u-card.big{min-width:75px;padding:10px 8px;}
  .u-card .avatar{font-size:28px;margin-bottom:2px;}
  .u-card.big .avatar{font-size:36px;margin-bottom:4px;}
  .u-card .uname{color:#fff;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;}
  .u-card .udist{color:#4FC3F7;font-size:10px;margin-top:1px;}
  .u-card .utime{color:#5a7a94;font-size:9px;margin-top:1px;}

  .empty-map{
    position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:1000;
    background:rgba(10,22,40,0.9);border-radius:14px;padding:14px 24px;
    border:1px solid rgba(79,195,247,0.2);text-align:center;
  }

  /* 내위치 버튼 */
  #recenterBtn{
    position:absolute;right:12px;z-index:1000;
    background:rgba(10,22,40,0.9);border:1px solid rgba(79,195,247,0.3);
    border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;
    display:none;align-items:center;justify-content:center;color:#fff;
  }

  /* 공유 모달 */
  .share-ok{color:#4FC3F7;font-size:13px;text-align:center;margin-top:8px;display:none;}

  /* Leaflet 커스텀 */
  .leaflet-control-zoom{display:none!important;}
  .leaflet-control-attribution{font-size:8px!important;opacity:0.5!important;}
</style>
</head>
<body>

<!-- ===== 닉네임 페이지 ===== -->
<div id="nickPage" class="page active">
  <div class="globe">🌍</div>
  <h1>HERE</h1>
  <div class="sub">실시간 위치 공유</div>
  <div class="card">
    <div class="avatar-big" id="previewAvatar">🧑</div>
    <div class="gender-row">
      <button class="gender-btn sel" onclick="pickGender('m',this)">👨 남성</button>
      <button class="gender-btn" onclick="pickGender('f',this)">👩 여성</button>
    </div>
    <input class="nick-input" id="nickInput" placeholder="닉네임을 입력하세요" maxlength="8" oninput="checkNick()">
  </div>
  <button class="connect-btn" id="nickBtn" onclick="goLobby()">입장하기</button>
</div>

<!-- ===== 로비 페이지 ===== -->
<div id="lobbyPage" class="page">
  <div class="lobby-top">
    <h2>🏠 로비</h2>
    <div class="nick-info" id="lobbyNick"></div>
  </div>
  <div class="lobby-actions">
    <button class="lobby-btn create" onclick="showCreate()">+ 방 만들기</button>
    <button class="lobby-btn refresh" onclick="loadRooms()">🔄 새로고침</button>
    <button class="lobby-btn refresh" onclick="exitLobby()">🚪 나가기</button>
  </div>
  <div class="room-list" id="roomList">
    <div class="empty-lobby">아직 열린 방이 없어요<br>방을 만들어보세요! 🏠</div>
  </div>
</div>

<!-- ===== 지도 페이지 ===== -->
<div id="mapPage" class="page">
  <div class="top-bar">
    <div class="top-left">
      <span class="top-room" id="mapRoom">방이름</span>
      <span class="top-status" id="topStatus">📡 접속 중</span>
    </div>
    <div class="top-right">
      <button class="top-btn btn-hide" id="toggleBtn" onclick="toggleOnline()">숨기기</button>
      <button class="top-btn btn-share" onclick="showShare()">공유</button>
      <button class="top-btn btn-exit" onclick="confirmExit()">나가기</button>
    </div>
  </div>
  <div id="map"></div>
  <div id="gpsLoading">
    <div class="spin" style="font-size:36px;margin-bottom:12px">📡</div>
    <div style="font-size:15px;font-weight:600">GPS 연결 중...</div>
    <div style="font-size:11px;color:#5a7a94;margin-top:8px">위치 권한을 허용해주세요</div>
  </div>
  <button id="recenterBtn" onclick="recenter()">🎯</button>
  <div id="userCards" class="user-cards" style="display:none;"></div>
  <div id="emptyMap" class="empty-map" style="display:none;">
    <div style="color:#8EACC1;font-size:13px">아직 접속한 사람이 없어요 👀</div>
    <div style="font-size:11px;color:#5a7a94;margin-top:4px">공유 버튼으로 다른 사람을 초대하세요!</div>
  </div>
</div>

<!-- ===== 방 만들기 모달 ===== -->
<div id="createModal" class="modal-bg" onclick="if(event.target===this)hideCreate()">
  <div class="modal-box">
    <h3>🏠 방 만들기</h3>
    <input class="modal-input" id="cName" placeholder="방 이름" maxlength="20">
    <input class="modal-input" id="cPw" placeholder="비밀번호 (4자리 숫자)" maxlength="4" inputmode="numeric" type="password">
    <div class="modal-err" id="createErr"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="hideCreate()">취소</button>
      <button class="modal-ok" onclick="doCreate()">만들기</button>
    </div>
  </div>
</div>

<!-- ===== 방 입장 모달 ===== -->
<div id="joinModal" class="modal-bg" onclick="if(event.target===this)hideJoin()">
  <div class="modal-box">
    <h3>🔑 비밀번호 입력</h3>
    <div id="joinLabel" style="text-align:center;color:#8EACC1;font-size:13px;margin-bottom:12px;"></div>
    <input class="modal-input" id="joinPw" placeholder="비밀번호 4자리" maxlength="4" inputmode="numeric" type="password">
    <div class="modal-err" id="joinErr"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="hideJoin()">취소</button>
      <button class="modal-ok" onclick="doJoin()">입장</button>
    </div>
  </div>
</div>

<!-- ===== 나가기 확인 모달 ===== -->
<div id="exitModal" class="modal-bg" onclick="if(event.target===this)hideExit()">
  <div class="modal-box">
    <h3>나가기</h3>
    <div style="text-align:center;color:#8EACC1;font-size:14px;margin-bottom:16px;">방에서 나가시겠어요?<br>내 위치는 삭제됩니다.</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="hideExit()">취소</button>
      <button class="modal-ok" onclick="doExit()">나가기</button>
    </div>
  </div>
</div>

<!-- ===== 공유 모달 ===== -->
<div id="shareModal" class="modal-bg" onclick="if(event.target===this)hideShare()">
  <div class="modal-box">
    <h3>📤 공유하기</h3>
    <div style="text-align:center;color:#8EACC1;font-size:13px;margin-bottom:6px;">방 이름: <span id="sName" style="color:#fff;font-weight:600;"></span></div>
    <div style="text-align:center;color:#8EACC1;font-size:13px;margin-bottom:16px;">비밀번호: <span id="sPw" style="color:#4FC3F7;font-weight:600;"></span></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="hideShare()">닫기</button>
      <button class="modal-ok" onclick="copyShare()">복사 / 공유</button>
    </div>
    <div class="share-ok" id="shareOk"></div>
  </div>
</div>

<script>
// =============================================
//  ★★★ Firebase 설정 ★★★
//  GitHub에 올린 버전에서 아래 값을 복사해 넣으세요
// =============================================
var firebaseConfig = {
  apiKey: "AIzaSyDigW9GGdbEU7M1-YHHpvpdsmdQ--ywhUU",
  authDomain: "here-gps.firebaseapp.com",
  databaseURL: "https://here-gps-default-rtdb.firebaseio.com",
  projectId: "here-gps",
  storageBucket: "here-gps.firebasestorage.app",
  messagingSenderId: "375478624169",
  appId: "1:375478624169:web:9b9575483ee97de050eeb8"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ===== 상수 =====
var MALE = ["🧑","👨","👦","🧔","👨‍🦱","👨‍🦰","👨‍🦳","🧑‍🦱"];
var FEMALE = ["👩","👧","👩‍🦱","👩‍🦰","👩‍🦳","🧑‍🦰","👱‍♀️","👩‍🦲"];

// ===== 전역 변수 =====
var uid = "u_" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
var nickname = "";
var gender = "m";
var myAvatar = "🧑";
var curRoomId = "";
var curRoom = "";
var curRoomPw = "";
var roomRef = null;
var lobbyRef = null;
var pendJoin = "";
var leafletMap = null;
var myMarker = null;
var markers = {};
var myPos = null;
var watchId = null;
var online = true;
var updTimer = null;

// ===== 페이지 전환 =====
function showPage(id) {
  document.querySelectorAll(".page").forEach(function(p){ p.classList.remove("active"); });
  document.getElementById(id).classList.add("active");
}

// ===== 1. 닉네임 페이지 =====
function pickGender(g, btn) {
  gender = g;
  document.querySelectorAll(".gender-btn").forEach(function(b){ b.classList.remove("sel"); });
  btn.classList.add("sel");
  document.getElementById("previewAvatar").textContent = g === "m" ? "🧑" : "👩";
}

function checkNick() {
  var v = document.getElementById("nickInput").value.trim();
  var btn = document.getElementById("nickBtn");
  if (v.length > 0) {
    btn.classList.add("active");
    btn.disabled = false;
  } else {
    btn.classList.remove("active");
    btn.disabled = true;
  }
}

function goLobby() {
  var v = document.getElementById("nickInput").value.trim();
  if (!v) return;
  nickname = v;
  document.getElementById("lobbyNick").textContent = myAvatar + " " + nickname;
  showPage("lobbyPage");
  loadRooms();
}

function exitLobby() {
  if (lobbyRef) { lobbyRef.off(); lobbyRef = null; }
  showPage("nickPage");
}

// ===== 2. 로비 =====
function loadRooms() {
  if (lobbyRef) lobbyRef.off();
  lobbyRef = db.ref("rooms");
  lobbyRef.on("value", function(snap) {
    var data = snap.val() || {};
    var list = document.getElementById("roomList");
    var items = [];
    Object.keys(data).forEach(function(rid) {
      var info = data[rid].info;
      var users = data[rid].users || {};
      if (!info) return;
      var count = Object.keys(users).length;
      // 10분 이상 아무도 없으면 삭제
      if (count === 0 && info.created && Date.now() - info.created > 600000) {
        db.ref("rooms/" + rid).remove();
        return;
      }
      items.push({ id: rid, name: info.name, count: count, created: info.created || 0 });
    });
    items.sort(function(a, b) { return b.created - a.created; });
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-lobby">아직 열린 방이 없어요<br>방을 만들어보세요! 🏠</div>';
      return;
    }
    list.innerHTML = items.map(function(r) {
      return '<div class="room-item" onclick="askJoin(\'' + r.id + '\',\'' + r.name.replace(/'/g, "\\'") + '\')">'
        + '<div><div class="room-name">' + r.name + '</div><div class="room-count">👥 ' + r.count + '명 접속 중</div></div>'
        + '<div class="room-arrow">›</div></div>';
    }).join("");
  });
}

function stopLobby() { if (lobbyRef) { lobbyRef.off(); lobbyRef = null; } }

// ===== 방 만들기 =====
function showCreate() {
  document.getElementById("cName").value = "";
  document.getElementById("cPw").value = "";
  document.getElementById("createErr").style.display = "none";
  document.getElementById("createModal").classList.add("show");
  document.getElementById("cName").focus();
}
function hideCreate() { document.getElementById("createModal").classList.remove("show"); }
function doCreate() {
  var name = document.getElementById("cName").value.trim();
  var pw = document.getElementById("cPw").value.trim();
  var err = document.getElementById("createErr");
  if (!name) { err.textContent = "방 이름을 입력하세요"; err.style.display = "block"; return; }
  if (pw.length !== 4 || isNaN(pw)) { err.textContent = "비밀번호 4자리 숫자를 입력하세요"; err.style.display = "block"; return; }
  hideCreate();
  var rid = Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
  db.ref("rooms/" + rid + "/info").set({ name: name, pw: pw, created: Date.now() });
  curRoomPw = pw;
  enterRoom(rid, name);
}

// ===== 방 입장 =====
function askJoin(rid, rn) {
  pendJoin = rid;
  document.getElementById("joinLabel").textContent = "방: " + rn;
  document.getElementById("joinPw").value = "";
  document.getElementById("joinErr").style.display = "none";
  document.getElementById("joinModal").classList.add("show");
  document.getElementById("joinPw").focus();
}
function hideJoin() { document.getElementById("joinModal").classList.remove("show"); }
function doJoin() {
  var pw = document.getElementById("joinPw").value.trim();
  var err = document.getElementById("joinErr");
  if (pw.length !== 4) { err.textContent = "4자리 비밀번호를 입력하세요"; err.style.display = "block"; return; }
  db.ref("rooms/" + pendJoin + "/info").once("value", function(snap) {
    var info = snap.val();
    if (!info) { err.textContent = "방이 존재하지 않습니다"; err.style.display = "block"; return; }
    if (info.pw !== pw) { err.textContent = "비밀번호가 틀렸습니다"; err.style.display = "block"; return; }
    hideJoin();
    curRoomPw = pw;
    enterRoom(pendJoin, info.name);
  });
}

function enterRoom(rid, roomName) {
  stopLobby();
  curRoomId = rid;
  curRoom = roomName;
  roomRef = db.ref("rooms/" + rid + "/users");
  roomRef.once("value", function(snap) {
    var data = snap.val() || {};
    var taken = Object.values(data).map(function(u) { return u.avatar; });
    var pool = gender === "m" ? MALE : FEMALE;
    var avail = pool.filter(function(a) { return taken.indexOf(a) < 0; });
    myAvatar = avail.length > 0 ? avail[Math.floor(Math.random() * avail.length)] : pool[Math.floor(Math.random() * pool.length)];
    document.getElementById("mapRoom").textContent = roomName;
    document.getElementById("lobbyNick").textContent = myAvatar + " " + nickname;
    roomRef.child(uid).onDisconnect().remove();
    showPage("mapPage");
    online = true;
    updHideBtn();
    initMap();
    startGps();
    listenRoom();
    updTimer = setInterval(function() { if (myPos && online) pubMe(); }, 5000);
  });
}

// ===== 3. 지도 =====
function initMap() {
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
  markers = {};
  leafletMap = L.map("map", { zoomControl: false, attributionControl: true }).setView([37.0, 127.0], 14);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
    attribution: "© OpenStreetMap, © CARTO",
    maxZoom: 19
  }).addTo(leafletMap);
  setTimeout(function() { leafletMap.invalidateSize(); }, 300);
}

function startGps() {
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  document.getElementById("gpsLoading").style.display = "block";
  document.getElementById("recenterBtn").style.display = "none";

  // 빠른 첫 위치
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      myPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      document.getElementById("gpsLoading").style.display = "none";
      document.getElementById("recenterBtn").style.display = "flex";
      leafletMap.setView([myPos.lat, myPos.lon], 16);
      updateMyMarker();
      if (online) pubMe();
    },
    function() {},
    { enableHighAccuracy: false, maximumAge: 60000, timeout: 5000 }
  );

  watchId = navigator.geolocation.watchPosition(
    function(pos) {
      myPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      document.getElementById("gpsLoading").style.display = "none";
      document.getElementById("recenterBtn").style.display = "flex";
      updateMyMarker();
      if (online) pubMe();
    },
    function(err) {
      var msg = "";
      if (err.code === 1) msg = "위치 권한이 거부되었습니다<br><span style='font-size:12px;color:#5a7a94'>브라우저 설정에서 위치 권한을 허용해주세요</span>";
      else if (err.code === 2) msg = "GPS 신호를 찾을 수 없습니다<br><span style='font-size:12px;color:#5a7a94'>실외에서 다시 시도해주세요</span>";
      else msg = "위치 확인 시간이 초과되었습니다";
      document.getElementById("gpsLoading").innerHTML =
        '<div style="font-size:36px;margin-bottom:12px">⚠️</div>'
        + '<div style="font-size:15px;font-weight:600">' + msg + '</div>'
        + '<button onclick="retryGps()" style="margin-top:16px;background:linear-gradient(135deg,#4FC3F7,#0288D1);border:none;border-radius:10px;padding:10px 28px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">다시 시도 🔄</button>';
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 20000 }
  );
}

function retryGps() {
  document.getElementById("gpsLoading").innerHTML =
    '<div class="spin" style="font-size:36px;margin-bottom:12px">📡</div>'
    + '<div style="font-size:15px;font-weight:600">GPS 재연결 중...</div>';
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  startGps();
}

function updateMyMarker() {
  if (!leafletMap || !myPos) return;
  var icon = L.divIcon({
    html: '<div style="font-size:32px;filter:drop-shadow(0 2px 6px rgba(79,195,247,0.5));text-align:center">' + myAvatar + '</div><div style="width:8px;height:8px;background:#4FC3F7;border-radius:50%;margin:-2px auto 0;box-shadow:0 0 8px #4FC3F7"></div>',
    iconSize: [40, 46], iconAnchor: [20, 46], className: ""
  });
  if (myMarker) { myMarker.setLatLng([myPos.lat, myPos.lon]).setIcon(icon); }
  else { myMarker = L.marker([myPos.lat, myPos.lon], { icon: icon }).addTo(leafletMap); }
}

function pubMe() {
  if (!roomRef || !myPos) return;
  roomRef.child(uid).set({
    nickname: nickname, avatar: myAvatar,
    lat: myPos.lat, lon: myPos.lon, ts: Date.now()
  });
}

function unpublish() {
  if (roomRef) roomRef.child(uid).remove();
}

// ===== 다른 유저 =====
function listenRoom() {
  if (!roomRef) return;
  roomRef.on("value", function(snap) {
    var data = snap.val() || {};
    // 10분 지난 유저 삭제
    var now = Date.now();
    Object.keys(data).forEach(function(k) {
      if (data[k].ts && now - data[k].ts > 600000) {
        db.ref("rooms/" + curRoomId + "/users/" + k).remove();
        delete data[k];
      }
    });
    // 다른 유저 마커
    var otherIds = {};
    var others = [];
    Object.keys(data).forEach(function(k) {
      if (k === uid) return;
      otherIds[k] = true;
      var u = data[k];
      others.push(u);
      var icon = L.divIcon({
        html: '<div style="font-size:28px;text-align:center">' + u.avatar + '</div>',
        iconSize: [36, 36], iconAnchor: [18, 36], className: ""
      });
      if (markers[k]) {
        markers[k].setLatLng([u.lat, u.lon]).setIcon(icon);
      } else {
        markers[k] = L.marker([u.lat, u.lon], { icon: icon }).addTo(leafletMap);
      }
    });
    // 사라진 유저 정리
    Object.keys(markers).forEach(function(k) {
      if (!otherIds[k]) { leafletMap.removeLayer(markers[k]); delete markers[k]; }
    });
    renderCards(others);
  });
}

function renderCards(users) {
  var cardsEl = document.getElementById("userCards");
  var emptyEl = document.getElementById("emptyMap");
  var reBtn = document.getElementById("recenterBtn");

  if (users.length > 0) {
    cardsEl.style.display = "block";
    emptyEl.style.display = "none";
    reBtn.style.bottom = (users.length <= 4) ? "120px" : "180px";
    var big = users.length <= 4;
    var html = '<div class="cards-row">';
    var max = Math.min(users.length, 8);
    for (var i = 0; i < max; i++) {
      var u = users[i];
      var dist = myPos ? calcDist(myPos.lat, myPos.lon, u.lat, u.lon) : "";
      html += '<div class="u-card' + (big ? ' big' : '') + '" onclick="flyTo(' + u.lat + ',' + u.lon + ')">'
        + '<div class="avatar">' + u.avatar + '</div>'
        + '<div class="uname">' + u.nickname + '</div>'
        + (dist ? '<div class="udist">📍 ' + dist + '</div>' : '')
        + '<div class="utime">' + timeAgo(u.ts) + '</div></div>';
    }
    html += '</div>';
    cardsEl.innerHTML = html;
  } else {
    cardsEl.style.display = "none";
    reBtn.style.bottom = "80px";
    emptyEl.style.display = myPos ? "block" : "none";
  }
}

function flyTo(lat, lon) { if (leafletMap) leafletMap.setView([lat, lon], 17); }

function calcDist(lat1, lon1, lat2, lon2) {
  var R = 6371000;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLon = (lon2 - lon1) * Math.PI / 180;
  var a = Math.sin(dLat / 2) * Math.sin(dLat / 2)
    + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
  var d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  if (d < 1000) return Math.round(d) + "m";
  return (d / 1000).toFixed(1) + "km";
}

function timeAgo(ts) {
  var s = Math.floor((Date.now() - ts) / 1000);
  if (s < 10) return "방금";
  if (s < 60) return s + "초 전";
  if (s < 3600) return Math.floor(s / 60) + "분 전";
  return Math.floor(s / 3600) + "시간 전";
}

// ===== 컨트롤 =====
function toggleOnline() {
  if (online) {
    online = false;
    unpublish();
  } else {
    online = true;
    if (myPos) pubMe();
  }
  updHideBtn();
}

function updHideBtn() {
  var btn = document.getElementById("toggleBtn");
  var st = document.getElementById("topStatus");
  if (online) {
    btn.style.background = "rgba(255,107,107,0.15)";
    btn.style.color = "#ff6b6b";
    btn.style.borderColor = "rgba(255,107,107,0.3)";
    btn.textContent = "숨기기";
    st.style.color = "#4FC3F7";
    st.textContent = "📡 접속 중";
  } else {
    btn.style.background = "rgba(79,195,247,0.15)";
    btn.style.color = "#4FC3F7";
    btn.style.borderColor = "rgba(79,195,247,0.3)";
    btn.textContent = "접속";
    st.style.color = "#ff7043";
    st.textContent = "⏸ 숨김";
  }
}

function recenter() { if (leafletMap && myPos) leafletMap.setView([myPos.lat, myPos.lon], 16); }

// ===== 나가기 =====
function confirmExit() { document.getElementById("exitModal").classList.add("show"); }
function hideExit() { document.getElementById("exitModal").classList.remove("show"); }
function doExit() {
  hideExit();
  unpublish();
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (updTimer) { clearInterval(updTimer); updTimer = null; }
  if (roomRef) { roomRef.off(); roomRef = null; }
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
  myMarker = null;
  markers = {};
  myPos = null;
  curRoomId = "";
  curRoom = "";
  curRoomPw = "";
  showPage("lobbyPage");
  loadRooms();
}

  document.getElementById("sName").textContent = curRoom;
  document.getElementById("sPw").textContent = curRoomPw;
  document.getElementById("shareOk").style.display = "none";
  document.getElementById("shareModal").classList.add("show");
}
function hideShare() { document.getElementById("shareModal").classList.remove("show"); }
function copyShare() {
  var url = "https://kjh964-creator.github.io/here-app/";
  var t = "📍 HERE - 실시간 위치 공유\n\n🏠 방 이름: " + curRoom + "\n🔑 비밀번호: " + curRoomPw
    + "\n\n접속 링크:\n" + url
    + "\n\n✅ 링크 접속 → 닉네임 입력 → 방 입장 → 비밀번호 입력"

// ===== 정리 =====
window.addEventListener("beforeunload", function() { unpublish(); });
window.addEventListener("pagehide", function() { unpublish(); });

// ===== PWA =====
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function() {});
}
